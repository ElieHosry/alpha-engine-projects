<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Platformer (Alpha Engine / WebGL)</title>
  <link rel="icon" href="data:,">
  <!-- iOS "Add to Home Screen": launches chromeless (no Safari toolbars) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Platformer">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    html, body { margin: 0; height: 100%; background: #000; color: #ddd;
                 font-family: system-ui, sans-serif; overflow: hidden; }
    /* Fill the whole viewport and center the canvas. 100dvh tracks the live
       visible height on mobile (toolbars / orientation changes). */
    .wrap { display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh; height: 100dvh; padding: 0; box-sizing: border-box; }
    /* Backing buffer stays 800x600; fit inside BOTH width and height so the 4:3
       game letterboxes instead of overflowing off-screen in landscape. */
    canvas { background: #000; display: block; image-rendering: pixelated; outline: none;
             max-width: 100vw; max-height: 100vh; max-height: 100dvh; }
    /* Loading text/bar overlay - taken out of layout so they don't shrink the canvas. */
    #status   { position: fixed; top: 8px; left: 0; right: 0; text-align: center;
                font-size: 14px; color: #9a9a9a; pointer-events: none; z-index: 5; }
    progress  { position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
                width: 320px; max-width: 70vw; z-index: 5; }

    /* ---- On-screen touch controls: only shown on touch devices ---- */
    #touch-controls { display: none; }
    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: block; }
    }
    .tc-btn {
      position: fixed; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.14); color: #fff;
      border: 1px solid rgba(255,255,255,0.30); border-radius: 14px;
      font-size: 28px; font-weight: 700; user-select: none; -webkit-user-select: none;
      touch-action: none; -webkit-tap-highlight-color: transparent;
    }
    .tc-btn.active { background: rgba(255,255,255,0.40); }
    /* Anchor controls to the safe area so they aren't clipped by the notch/home bar. */
    #btn-left  { left: calc(18px  + env(safe-area-inset-left)); bottom: calc(24px + env(safe-area-inset-bottom)); width: 78px; height: 78px; }
    #btn-right { left: calc(108px + env(safe-area-inset-left)); bottom: calc(24px + env(safe-area-inset-bottom)); width: 78px; height: 78px; }
    #btn-jump  { right: calc(24px + env(safe-area-inset-right)); bottom: calc(24px + env(safe-area-inset-bottom)); width: 110px; height: 90px; font-size: 20px; }
    .tc-small  { top: calc(14px + env(safe-area-inset-top)); width: 52px; height: 44px; font-size: 20px; }
    #btn-1 { right: calc(144px + env(safe-area-inset-right)); } #btn-2 { right: calc(86px + env(safe-area-inset-right)); } #btn-q { right: calc(28px + env(safe-area-inset-right)); }
    #btn-menu { top: calc(14px + env(safe-area-inset-top)); left: calc(14px + env(safe-area-inset-left)); height: 44px; padding: 0 16px; font-size: 16px; }
    #btn-fs   { top: calc(14px + env(safe-area-inset-top)); left: calc(104px + env(safe-area-inset-left)); width: 52px; height: 44px; font-size: 22px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="status">Loading…</div>
    <progress id="progress" value="0" max="100"></progress>
    <!-- The engine requests an 800x600 window in AESysInit -->
    <canvas id="canvas" width="800" height="600" tabindex="-1"
            oncontextmenu="event.preventDefault()"></canvas>
  </div>

  <!-- Touch controls (auto-hidden on desktop). Each simulates a real key. -->
  <div id="touch-controls">
    <div class="tc-btn" id="btn-menu">MENU</div>
    <div class="tc-btn" id="btn-fs">&#9974;</div>
    <div class="tc-btn tc-small" id="btn-1">1</div>
    <div class="tc-btn tc-small" id="btn-2">2</div>
    <div class="tc-btn tc-small" id="btn-q">Q</div>
    <div class="tc-btn" id="btn-left">&#9664;</div>
    <div class="tc-btn" id="btn-right">&#9654;</div>
    <div class="tc-btn" id="btn-jump">JUMP</div>
  </div>

  <script>
    var statusEl = document.getElementById('status');
    var progressEl = document.getElementById('progress');
    var Module = {
      canvas: (function () { return document.getElementById('canvas'); })(),
      print:    function (text) { console.log(text); },
      printErr: function (text) { console.error(text); },
      setStatus: function (text) {
        statusEl.textContent = text;
        if (!text) progressEl.style.display = 'none';
      },
      monitorRunDependencies: function () {}
    };
    Module.setStatus('Downloading…');
    window.onerror = function () { Module.setStatus('Exception thrown - see console'); };
  </script>

  <script>
    // ---- Touch controls -> synthetic keyboard events ----
    // The engine reads SDL_GetKeyboardState(); SDL builds that state from DOM
    // key events. Dispatching a synthetic KeyboardEvent is therefore identical
    // to a real key press from the game's point of view - no C++ changes needed.
    (function () {
      var KEYS = {
        left:  { key: 'ArrowLeft',  code: 'ArrowLeft',  keyCode: 37 },  // AEVK_LEFT
        right: { key: 'ArrowRight', code: 'ArrowRight', keyCode: 39 },  // AEVK_RIGHT
        jump:  { key: ' ',          code: 'Space',      keyCode: 32 },  // AEVK_SPACE
        esc:   { key: 'Escape',     code: 'Escape',     keyCode: 27 },  // AEVK_ESCAPE -> menu
        k1:    { key: '1',          code: 'Digit1',     keyCode: 49 },  // AEVK_1
        k2:    { key: '2',          code: 'Digit2',     keyCode: 50 },  // AEVK_2
        q:     { key: 'q',          code: 'KeyQ',       keyCode: 81 }   // AEVK_Q
      };

      function dispatchKey(type, def) {
        var ev = new KeyboardEvent(type, {
          key: def.key, code: def.code,
          keyCode: def.keyCode, which: def.keyCode,
          bubbles: true, cancelable: true
        });
        window.dispatchEvent(ev);   // SDL registers its keyboard listener on the window
      }

      function bindKey(id, defName) {
        var el = document.getElementById(id);
        if (!el) return;
        var def = KEYS[defName];
        var down = false;
        function press(e) {
          if (e) e.preventDefault();
          if (!down) { down = true; el.classList.add('active'); dispatchKey('keydown', def); }
        }
        function release(e) {
          if (e) e.preventDefault();
          if (down) { down = false; el.classList.remove('active'); dispatchKey('keyup', def); }
        }
        el.addEventListener('pointerdown',   press);
        el.addEventListener('pointerup',     release);
        el.addEventListener('pointercancel', release);
        el.addEventListener('pointerleave',  release);
        window.addEventListener('pointerup', release);   // safety: release if finger lifts anywhere
      }

      function bindFullscreen(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('pointerup', function (e) {
          e.preventDefault();
          var cv = document.getElementById('canvas');
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            var req = cv.requestFullscreen || cv.webkitRequestFullscreen;
            if (req) req.call(cv);
          } else {
            var exit = document.exitFullscreen || document.webkitExitFullscreen;
            if (exit) exit.call(document);
          }
        });
      }

      function init() {
        bindKey('btn-left', 'left'); bindKey('btn-right', 'right'); bindKey('btn-jump', 'jump');
        bindKey('btn-menu', 'esc');
        bindKey('btn-1', 'k1'); bindKey('btn-2', 'k2'); bindKey('btn-q', 'q');
        bindFullscreen('btn-fs');
      }
      if (document.readyState !== 'loading') init();
      else document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
