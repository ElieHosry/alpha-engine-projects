<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Pong (Alpha Engine / WebGL)</title>
  <link rel="icon" href="data:,">
  <!-- iOS "Add to Home Screen": launches chromeless (no Safari toolbars) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pong">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    html, body { margin: 0; height: 100%; background: #000; color: #ddd;
                 font-family: system-ui, sans-serif; overflow: hidden; }
    .wrap { display: flex; align-items: center; justify-content: center;
            width: 100vw; height: 100vh; height: 100dvh; padding: 0; box-sizing: border-box; }
    canvas { background: #000; display: block; image-rendering: pixelated; outline: none;
             max-width: 100vw; max-height: 100vh; max-height: 100dvh;
             touch-action: none; }
    #status   { position: fixed; top: 8px; left: 0; right: 0; text-align: center;
                font-size: 14px; color: #9a9a9a; pointer-events: none; z-index: 5; }
    progress  { position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
                width: 320px; max-width: 70vw; z-index: 5; }
    /* START button — touch devices only, shown by C++ during menu state */
    #btn-start {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      padding: 16px 64px; font-size: 22px; font-family: system-ui, sans-serif;
      background: #111; color: #fff; border: 2px solid #fff; border-radius: 8px;
      cursor: pointer; z-index: 10; touch-action: manipulation; display: none;
    }
    /* RESTART button — touch devices only, shown by C++ when win state is entered */
    #btn-restart {
      position: fixed; bottom: 24px; right: 24px;
      padding: 14px 40px; font-size: 20px; font-family: system-ui, sans-serif;
      background: #111; color: #fff; border: 2px solid #fff; border-radius: 8px;
      cursor: pointer; z-index: 10; touch-action: manipulation; display: none;
    }
    @media (pointer: fine) { #btn-start, #btn-restart { display: none !important; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="status">Loading…</div>
    <progress id="progress" value="0" max="100"></progress>
    <canvas id="canvas" width="1280" height="720" tabindex="-1"
            oncontextmenu="event.preventDefault()"></canvas>
    <button id="btn-start">START</button>
    <button id="btn-restart">RESTART</button>
  </div>

  <script>
    var statusEl = document.getElementById('status');
    var progressEl = document.getElementById('progress');
    var Module = {
      canvas: (function () { return document.getElementById('canvas'); })(),
      print:    function (text) { console.log(text); },
      printErr: function (text) { console.error(text); },
      setStatus: function (text) {
        statusEl.textContent = text;
        if (!text) {
          progressEl.style.display = 'none';
          // Button visibility is controlled from C++ (shown only on win screen).
        }
      },
      monitorRunDependencies: function () {}
    };
    Module.setStatus('Downloading…');
    window.onerror = function () { Module.setStatus('Exception thrown - see console'); };
  </script>

  <script>
    // ---- Touch controls ----
    // Finger Y position maps directly to the player paddle's target Y in game-world
    // coordinates. C++ moves the paddle toward the target each frame at PLAYER_SPEED.
    // This is much more responsive than the previous delta-based swipe approach.
    (function () {
      var canvas = document.getElementById('canvas');

      function sendTargetY(e) {
        var rect = canvas.getBoundingClientRect();
        var relY = e.clientY - rect.top;
        // Map canvas CSS Y (0=top, rect.height=bottom) to game world Y (+360=top, -360=bottom).
        var gameY = (rect.height / 2 - relY) * (720 / rect.height);
        Module.ccall('SetPlayerTargetY', null, ['number'], [gameY]);
      }

      canvas.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        sendTargetY(e);
      });

      canvas.addEventListener('pointermove', function (e) {
        if (!e.buttons) return;
        sendTargetY(e);
      });

      // START button — calls StartGame() exported from C++ menu state.
      document.getElementById('btn-start').addEventListener('pointerdown', function (e) {
        e.preventDefault();
        Module.ccall('StartGame', null, [], []);
      });

      // RESTART button — calls DoRestart() exported from C++ win state.
      document.getElementById('btn-restart').addEventListener('pointerdown', function (e) {
        e.preventDefault();
        Module.ccall('DoRestart', null, [], []);
      });
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
